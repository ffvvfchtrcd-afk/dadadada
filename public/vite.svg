<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" fill="none">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background premium contornado -->
  <rect width="100" height="100" rx="24" fill="#0f172a" />
  <rect width="96" height="96" x="2" y="2" rx="22" fill="#090d16" stroke="#1e293b" stroke-width="2" />
  <!-- Letra N em Neon Neon -->
  <path d="M32 70 V30 L68 70 V30" stroke="url(#glowGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
</svg>
